<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlord v16.0 | Master Thermal Raster</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg: #000205;
            --action-green: #69BE28; 
            --neon-blue: #00f2ff;
            --panel: rgba(2, 6, 12, 0.95);
        }

        body { margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Consolas', monospace; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* --- ADVANCED HUD --- */
        .hud {
            position: absolute; top: 20px; left: 20px; width: 380px;
            background: var(--panel); border: 1px solid #1e293b;
            border-left: 5px solid var(--action-green); border-radius: 4px;
            padding: 25px; z-index: 10; box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        h1 { margin: 0 0 15px 0; font-size: 1.2rem; letter-spacing: 5px; color: var(--action-green); text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; }
        .lbl { color: #64748b; font-weight: bold; }
        .val { font-weight: bold; color: var(--neon-blue); }

        /* --- THE TOGGLE SWITCH --- */
        .tgl-container { margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
        .switch { position: relative; width: 60px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #0f172a; transition: .4s; border-radius: 34px; border: 1px solid #334155; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 3px; background-color: #475569; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--action-green); border-color: var(--action-green); }
        input:checked + .slider:before { transform: translateX(28px); background-color: #000; }

        /* --- RESULT MODAL --- */
        #modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel); border: 2px solid var(--neon-blue);
            padding: 60px; border-radius: 8px; text-align: center; z-index: 100;
            display: none; box-shadow: 0 0 100px rgba(0, 242, 255, 0.4);
        }
        .res-text { font-size: 3rem; font-weight: 900; margin: 20px 0; letter-spacing: 10px; }
        .btn-group { display: flex; gap: 20px; margin-top: 40px; }
        .btn { flex: 1; padding: 20px; border: 1px solid var(--neon-blue); background: transparent; color: var(--neon-blue); font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn:hover { background: var(--action-green); color: #000; border-color: var(--action-green); }

        #video-feed { position: absolute; bottom: 30px; right: 30px; width: 320px; border: 1px solid #334155; z-index: 10; transform: scaleX(-1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #rainbow-strobe { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; pointer-events: none; opacity: 0; }
    </style>
</head>
<body>

    <div id="rainbow-strobe"></div>
    <canvas id="webgl-canvas"></canvas>
    <video id="video-feed" autoplay playsinline></video>

    <div class="hud">
        <h1>Overlord v16.0</h1>
        <div class="data-row"><span class="lbl">UPLINK:</span><span class="val" id="status">INITIATING</span></div>
        <div class="data-row"><span class="lbl">SENSORS:</span><span class="val">956 NODES</span></div>
        <div class="data-row"><span class="lbl">PHENOTYPE:</span><span class="val" id="p-val">ANALYZING</span></div>
        
        <div class="tgl-container">
            <span class="lbl" style="color: #fff;">ACTUAL THERMAL MAP</span>
            <label class="switch">
                <input type="checkbox" id="thermal-switch" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="modal">
        <p style="color: #64748b; letter-spacing: 3px;">BIOMETRIC CLASSIFICATION</p>
        <div class="res-text" id="final-res">BLACK</div>
        <div class="btn-group">
            <button class="btn" onclick="finalize(true)">CONFIRM</button>
            <button class="btn" onclick="finalize(false)" style="border-color: #ff003c; color: #ff003c;">INCORRECT</button>
        </div>
    </div>

    <script>
        // --- 1. GPU SHADER ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 3000);
        camera.position.z = 900;
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Grid Floor
        const grid = new THREE.GridHelper(4000, 50, 0x002244, 0x00050b);
        grid.position.y = -500;
        scene.add(grid);

        // --- THE MASTER THERMAL RASTER MATERIAL ---
        const thermalUniforms = { time: { value: 0 }, thermalActive: { value: 1.0 } };
        const thermalMaterial = new THREE.ShaderMaterial({
            uniforms: thermalUniforms,
            vertexShader: `
                varying float vZ;
                void main() {
                    vZ = position.z;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying float vZ;
                uniform float thermalActive;
                void main() {
                    // Calculate Heat based on Z-depth (the physical surface of your face)
                    float heat = clamp((vZ + 60.0) / 120.0, 0.0, 1.0);
                    
                    if (thermalActive > 0.5) {
                        // IRONBOW GRADIENT: Deep Blue -> Purple -> Red -> Yellow -> White
                        vec3 color = vec3(0.0);
                        if(heat < 0.2) color = mix(vec3(0,0,0.3), vec3(0.4,0,0.5), heat*5.0);
                        else if(heat < 0.4) color = mix(vec3(0.4,0,0.5), vec3(1,0,0), (heat-0.2)*5.0);
                        else if(heat < 0.7) color = mix(vec3(1,0,0), vec3(1,0.6,0), (heat-0.4)*3.33);
                        else color = mix(vec3(1,0.6,0), vec3(1,1,1), (heat-0.7)*3.33);
                        gl_FragColor = vec4(color, 0.95);
                    } else {
                        // Skin Color Detector Mode (Action Green Mesh)
                        gl_FragColor = vec4(0.41, 0.75, 0.16, 0.8);
                    }
                }
            `,
            side: THREE.DoubleSide, transparent: true
        });

        // Neural Mesh Architecture
        const faceGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(478 * 3);
        faceGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        // Detailed Index Mapping to create a solid surface mesh
        const indices = [];
        for(let i=0; i<440; i++) {
            indices.push(i, i+1, i+33);
            indices.push(i+1, i+34, i+33);
        }
        faceGeo.setIndex(indices);
        
        const faceMesh = new THREE.Mesh(faceGeo, thermalMaterial);
        scene.add(faceMesh);

        // --- 2. LOGIC & HARDWARE ---
        let locked = false;
        let rainbow = false;
        const video = document.getElementById('video-feed');
        const sampler = document.createElement('canvas');

        document.getElementById('thermal-switch').onchange = (e) => {
            thermalUniforms.thermalActive.value = e.target.checked ? 1.0 : 0.0;
            faceMesh.material.wireframe = !e.target.checked;
        };

        function finalize(success) {
            document.getElementById('modal').style.display = 'none';
            if (success) {
                rainbow = true;
                document.getElementById('rainbow-strobe').style.opacity = '0.4';
                document.getElementById('p-val').innerText = document.getElementById('final-res').innerText;
                setTimeout(() => {
                    rainbow = false;
                    document.getElementById('rainbow-strobe').style.opacity = '0';
                }, 5000);
            } else {
                locked = true; // Error lockout
                setTimeout(() => { locked = false; }, 5000);
            }
        }

        // --- 3. AI PIPELINE ---
        const faceAI = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceAI.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

        faceAI.onResults((res) => {
            if (res.multiFaceLandmarks && res.multiFaceLandmarks.length > 0) {
                const marks = res.multiFaceLandmarks[0];
                const pos = faceGeo.attributes.position.array;
                document.getElementById('status').innerText = "SYNC_LOCKED";

                sampler.width = video.videoWidth; sampler.height = video.videoHeight;
                const ctx = sampler.getContext('2d'); ctx.drawImage(video, 0, 0);

                for (let i = 0; i < 478; i++) {
                    pos[i*3] = (marks[i].x - 0.5) * -1400;
                    pos[i*3+1] = (marks[i].y - 0.5) * -1400;
                    pos[i*3+2] = marks[i].z * 1400;
                }
                faceGeo.attributes.position.needsUpdate = true;

                if (!locked && !rainbow) {
                    const nose = ctx.getImageData(Math.floor(marks[1].x*sampler.width), Math.floor(marks[1].y*sampler.height), 1, 1).data;
                    const l = (0.299*nose[0] + 0.587*nose[1] + 0.114*nose[2]) / 255;
                    setTimeout(() => {
                        if(!locked && !rainbow) {
                            document.getElementById('final-res').innerText = l < 0.42 ? "BLACK" : "WHITE";
                            document.getElementById('modal').style.display = 'block';
                            locked = true;
                        }
                    }, 5000);
                }
            }
        });

        new Camera(video, { onFrame: async () => { await faceAI.send({image: video}); }, width: 1280, height: 720 }).start();

        function animate() {
            requestAnimationFrame(animate);
            if (rainbow) document.getElementById('rainbow-strobe').style.backgroundColor = `hsl(${Date.now() % 360}, 100%, 50%)`;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
